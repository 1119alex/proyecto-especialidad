targets:
  $default:
    builders:
      # Riverpod code generation
      riverpod_generator:
        options:
          line_length: 80

      # Drift code generation
      drift_dev:
        enabled: true
        generate_for:
          - lib/config/drift/database.dart
          - lib/config/drift/tables/*.dart
        options:
          store_date_time_values_as_text: true
          sql:
            dialect: sqlite

      # JSON Serialization
      json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake

      # Freezed (immutable models)
      freezed:
        enabled: false
