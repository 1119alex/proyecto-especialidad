name: frontend_movil
description: "Sistema de Gestión Logística de Transferencias de Inventario - Aplicación Móvil"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # STATE MANAGEMENT - Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3                          # Cliente HTTP con interceptors
  # retrofit: ^4.1.0                   # Type-safe REST client (temporalmente deshabilitado)
  json_annotation: ^4.9.0

  # LOCAL DATABASE - Drift (SQLite)
  drift: ^2.16.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # SECURE STORAGE
  flutter_secure_storage: ^9.0.0      # Para JWT y datos sensibles

  # QR CODE
  mobile_scanner: ^4.0.1               # Escanear QR (mejor rendimiento)
  qr_flutter: ^4.1.0                   # Generar QR

  # GPS & LOCATION
  geolocator: ^11.0.0                  # Geolocalización
  permission_handler: ^11.3.0          # Permisos

  # MAPS
  flutter_map: ^6.1.0                  # Alternativa open-source a Google Maps
  latlong2: ^0.9.0

  # FIREBASE
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19         # Push notifications

  # ROUTING
  go_router: ^13.2.1                   # Navegación declarativa

  # UTILS
  intl: ^0.18.1                        # Formateo de fechas
  connectivity_plus: ^5.0.2            # Detectar conexión
  freezed_annotation: ^2.4.1           # Immutable models
  logger: ^2.0.2+1                     # Logging
  uuid: ^4.3.3                         # Generar UUIDs

  # UI/UX
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0                      # Loading placeholders
  flutter_spinkit: ^5.2.0              # Loading indicators

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # CODE GENERATION
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  drift_dev: ^2.16.0
  json_serializable: ^6.7.1
  # retrofit_generator: ^8.1.0  # Temporalmente deshabilitado por incompatibilidad
  freezed: ^2.4.7
  custom_lint: ^0.6.4

  # TESTING
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Configuración de fuentes (opcional)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700
